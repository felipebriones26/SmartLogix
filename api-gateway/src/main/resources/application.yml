server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
          routes:
            - id: ms-usuarios
              uri: http://localhost:8081
              predicates:
                - Path=/api/usuarios/**
            - id: ms-inventario
              uri: http://localhost:8082
              predicates:
                - Path=/api/productos/**




                
            